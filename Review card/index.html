<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
       
    <div class="container">
          <h1>Our Reviews</h1> 
        <div class="card">
            <div class="pic"><img src="" alt="" height="130px" width="127px" id="profile"></div>
            <div class="name" id="name"></div>
            <div class="passion" id="passion"></div>
            <div class="description" id="description">
            </div>
            <div class="arrow-icons"><i class="fa-solid fa-chevron-left" id="btn-left"></i>
            <i class="fa-solid fa-chevron-right" id="btn-right"></i></div>
            <div class="contact-btn"><button>Surprise Me</button></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
